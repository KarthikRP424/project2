; ── PostureGuard ESP32 Wearable Firmware ─────────────────────────────────────
; PlatformIO configuration for ESP32 with NimBLE and MPU6050 support.
;
; Flash command: pio run --target upload
; Monitor:       pio device monitor --baud 115200

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

lib_deps =
    adafruit/Adafruit MPU6050 @ ^2.2.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    h2zero/NimBLE-Arduino @ ^1.4.2

monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
    -O2
